name: Plugin CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Gradle build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Build and test
        run: ./gradlew build --no-daemon
