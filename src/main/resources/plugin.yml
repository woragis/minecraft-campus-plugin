name: CampusWorld
version: '${version}'
main: com.woragis.campusworld.CampusWorldPlugin
api-version: '1.21'
description: CampusWorld — whitelist, convites e sync com a API.
author: woragis
commands:
  invite:
    description: Convida um jogador para o CampusWorld
    usage: /invite <jogador>
    permission: campusworld.invite
  campus:
    description: Utilitários CampusWorld
    usage: /campus status
    permission: campusworld.campus
  guild:
    description: Gerencia guildas do CampusWorld
    usage: /guild <create|join|leave>
    permission: campusworld.guild
  claim:
    description: Reivindica e protege terreno
    usage: /claim <mark|create|delete|clear>
    permission: campusworld.claim
  city:
    description: Cria cidades do CampusWorld
    usage: /city create <nome>
    permission: campusworld.city
permissions:
  campusworld.invite:
    description: Permite usar /invite
    default: true
  campusworld.campus:
    description: Permite usar /campus
    default: true
  campusworld.guild:
    description: Permite usar /guild
    default: true
  campusworld.claim:
    description: Permite usar /claim
    default: true
  campusworld.city:
    description: Permite usar /city
    default: true
