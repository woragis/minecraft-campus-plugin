name: CampusWorld
version: '${version}'
main: com.woragis.campusworld.CampusWorldPlugin
api-version: '1.21'
description: CampusWorld — whitelist, convites e sync com a API.
author: woragis
commands:
  invite:
    description: Convida um jogador para o CampusWorld
    usage: /invite <jogador>
    permission: campusworld.invite
  campus:
    description: Utilitários CampusWorld
    usage: /campus status
    permission: campusworld.campus
permissions:
  campusworld.invite:
    description: Permite usar /invite
    default: true
  campusworld.campus:
    description: Permite usar /campus
    default: true
